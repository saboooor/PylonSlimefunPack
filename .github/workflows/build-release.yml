name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Caches dependencies for faster runs

      - name: Build Pylon resource pack
        working-directory: pylon-resource-pack
        run: |
          python resource_pack_generator.py

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Build resource pack
        run: bun .
      
      # Push artifacts to GitHub actions
      - name: Upload resource pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: PylonSlimefun.zip
          path: PylonSlimefun.zip