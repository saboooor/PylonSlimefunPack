name: Build and Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-submodule:
    runs-on: ubuntu-latest
    outputs:
      submodule_changed: ${{ steps.check.outputs.submodule_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - id: check
        name: Check for submodule changes
        run: |
          git submodule update --remote --merge
          if git diff --quiet pylon-resource-pack; then
            echo "submodule_changed=false" >> $GITHUB_OUTPUT
          else
            echo "submodule_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push updated submodule pointer
        if: steps.check.outputs.submodule_changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pylon-resource-pack
          git commit -m "Update submodule to latest commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: detect-submodule
    if: ${{ needs.detect-submodule.outputs.submodule_changed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Pylon resource pack
        working-directory: pylon-resource-pack
        run: python resource_pack_generator.py

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Build resource pack
        run: bun .
      
      # Push artifacts to GitHub actions
      - name: Upload resource pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: PylonSlimefun
          path: PylonSlimefun/

      - name: Upload release asset
        run: gh release upload ${{ needs.release.outputs.tag_name }} PylonSlimefun.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}